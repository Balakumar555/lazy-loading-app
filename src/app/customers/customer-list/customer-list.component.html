<div class="customer-list">
      <h3>Customer List</h3>
      <div class="customer-grid">
        <div class="customer-card" *ngFor="let customer of customers">
          <h4>{{ customer.name }}</h4>
          <p>{{ customer.email }}</p>
          <p>{{ customer.phone }}</p>
          <a [routerLink]="['detail', customer.id]" class="btn">View Details</a>
        </div>
      </div>
    </div>
